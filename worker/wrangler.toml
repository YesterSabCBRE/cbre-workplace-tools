name = "cbre-workplace-tools-api"
main = "index.js"
compatibility_date = "2024-01-01"

# After deploying, add your GitHub Pages URL to ALLOWED_ORIGINS_EXTRA:
# wrangler secret put ALLOWED_ORIGINS_EXTRA
